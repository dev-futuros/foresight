services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foresight_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - foresight
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d foresight_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      # Picks the application-<profile>.properties from the env file (e.g. SPRING_PROFILES_ACTIVE=local).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/foresight_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-logging}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@foresight.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Foresight}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      DEBUG_PORT: ${DEBUG_PORT:-5005}
      JAVA_TOOL_OPTIONS: >
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "8080:8080"
      - "5005:5005"
    networks:
      - foresight
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # SonarQube comes up automatically when COMPOSE_PROFILES=quality is set in the env file
  # (the case for .env.local). Default creds: admin / admin (changed on first login).
  sonarqube:
    image: sonarqube:community
    profiles: [ "quality" ]
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    networks:
      - foresight
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

networks:
  foresight:
    external: true

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

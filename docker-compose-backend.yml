services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-foresight_db}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - foresight
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-foresight_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      # Picks the application-<profile>.properties from the env file (e.g. SPRING_PROFILES_ACTIVE=local).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      # Spring datasource URL composes the in-network db hostname (`db`,
      # the compose service name — kept fixed so the backend doesn't
      # have to know where db lives) with the db port + name from env.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-foresight_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Embedded Tomcat port. Defaults to 8080; override via SERVER_PORT
      # in the .env file if you need to dodge a host conflict. The
      # `ports` mapping below also reads SERVER_PORT so the host-side
      # port matches what Spring binds to.
      SERVER_PORT: ${SERVER_PORT:-8080}
      # Kinde — tenant domain + issuer + JWKS for session/webhook JWT validation, plus the
      # M2M client credentials used by KindeBackendClient for Management API calls
      # (fetch/update user profile). Defaults in application.properties keep the app
      # bootable when these are unset, but real values must come from .env.<profile>.
      KINDE_DOMAIN: ${KINDE_DOMAIN:-}
      KINDE_ISSUER: ${KINDE_ISSUER:-}
      KINDE_JWKS_URI: ${KINDE_JWKS_URI:-}
      KINDE_TOKEN_ENDPOINT: ${KINDE_TOKEN_ENDPOINT:-}
      KINDE_MANAGEMENT_API_BASE_URL: ${KINDE_MANAGEMENT_API_BASE_URL:-}
      KINDE_M2M_CLIENT_ID: ${KINDE_M2M_CLIENT_ID:-}
      KINDE_M2M_CLIENT_SECRET: ${KINDE_M2M_CLIENT_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-logging}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@foresight.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Foresight}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      DEBUG_PORT: ${DEBUG_PORT:-5005}
      # JDWP debug agent binds to the same DEBUG_PORT exposed in the
      # port mapping below. Quoting the substitution inside the heredoc
      # so a missing DEBUG_PORT doesn't silently produce `address=*:`
      # (which the JVM would reject at boot).
      JAVA_TOOL_OPTIONS: >
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:${DEBUG_PORT:-5005}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
      - "${DEBUG_PORT:-5005}:${DEBUG_PORT:-5005}"
    networks:
      - foresight
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  # SonarQube comes up automatically when COMPOSE_PROFILES=quality is set in the env file
  # (the case for .env.local). Default creds: admin / admin (changed on first login).
  # sonarqube:
  #   image: sonarqube:community
  #   profiles: [ "quality" ]
  #   environment:
  #     SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
  #   ports:
  #     - "${SONARQUBE_PORT:-9000}:9000"
  #   networks:
  #     - foresight
  #   volumes:
  #     - sonarqube_data:/opt/sonarqube/data
  #     - sonarqube_logs:/opt/sonarqube/logs
  #     - sonarqube_extensions:/opt/sonarqube/extensions

networks:
  foresight:
    external: true

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foresight_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - services
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d foresight_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      # Picks the application-<profile>.properties from the env file (e.g. SPRING_PROFILES_ACTIVE=local).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/foresight_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8080:8080"
    networks:
      - services
    depends_on:
      db:
        condition: service_healthy
    restart : unless-stopped

  # SonarQube comes up automatically when COMPOSE_PROFILES=quality is set in the env file
  # (the case for .env.local). Default creds: admin / admin (changed on first login).
  sonarqube:
    image: sonarqube:community
    profiles: ["quality"]
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    networks:
      - services
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

networks:
  services:
    driver: bridge

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

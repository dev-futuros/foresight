services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foresight-frontend
    # Port is driven by FRONTEND_MODE: 5173 for dev (Vite dev server),
    # 4173 for preview (Vite preview serving dist/). Set FRONTEND_PORT
    # in the stack-level .env.<profile> file alongside FRONTEND_MODE.
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    environment:
      # `development` for HMR + readable error overlays, `production` for
      # the preview path so the build picks up production-only optimisations.
      NODE_ENV: ${FRONTEND_NODE_ENV:-development}
      # Selects dev vs preview inside the entrypoint script.
      FRONTEND_MODE: ${FRONTEND_MODE:-dev}
      # Backend URL Vite's dev/preview proxies forward /api/* to. The
      # default targets the in-network `backend` service on its
      # default port, which is the right answer when both containers
      # run inside the same compose stack. Override via .env to point
      # at a backend on a different host (e.g. a deployed staging API).
      VITE_API_URL: ${VITE_API_URL:-http://backend:8080}
      # Vite's --host filter (`true` / `all` lets any host hit the dev
      # server; useful when the container is reached via tunnel/proxy
      # URLs the dev server doesn't know about).
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-all}
      # Vite reads VITE_CLERK_PUBLISHABLE_KEY from the bind-mounted
      # frontend/.env.local (available inside the container as /app/.env.local).
      # Don't set it here with a `${VAR:-""}` default — Docker Compose would
      # pass an empty string into process.env and that takes precedence over
      # the .env file in Vite, leaving Clerk unable to decode its hostname
      # from the publishable key (failed_to_load_clerk_js).
      # Vite watches via chokidar; on Windows/macOS host-mounted FS, inotify
      # events don't propagate, so polling is needed for HMR to pick up edits.
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      # Bind-mount source so host edits hot-reload inside the container in
      # dev mode. In preview mode the entrypoint re-runs `npm run build`
      # so dist/ on the bind mount reflects the current source.
      - ./frontend:/app
      # Named volume preserves the image's installed node_modules so the
      # bind mount above doesn't shadow them with the (empty) host dir.
      - frontend_node_modules:/app/node_modules
    networks:
      - foresight
    restart: unless-stopped

volumes:
  frontend_node_modules:

networks:
  foresight:
    external: true

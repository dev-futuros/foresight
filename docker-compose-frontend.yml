services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foresight-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend:8080
    networks:
      - foresight
    restart: unless-stopped

networks:
  foresight:
    external: true

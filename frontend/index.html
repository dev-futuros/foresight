<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons + PWA icons from /public. The base 32px is the standard
         browser-tab favicon; apple-touch-icon is the iOS home-screen
         glyph; icon-192 / icon-512 / icon-512-maskable feed Android +
         desktop PWA install flows (declared via the web manifest once
         we add one — for now they're discoverable directly). -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Futuros — Foresight Strategy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />

    <!--
      PostHog analytics — current snippet from posthog.com/docs (2026-01-30 defaults).
      Project key + host are baked at build time via Vite's HTML env substitution so
      we don't ship one analytics project across dev / preview / prod. To turn
      analytics off in a given environment, leave VITE_POSTHOG_KEY blank — the
      init below short-circuits and posthog.* calls become no-ops via the stub
      installed below.

      `opt_out_capturing_by_default: true` means nothing is captured until the
      CookieConsent component calls posthog.opt_in_capturing() after the user
      accepts. The snippet stubs window.posthog before array.js arrives so calls
      issued early queue and replay once the real SDK is loaded.

      Session recording is on (explicitly requested for this project). PostHog's
      defaults mask <input>s and password fields — DO NOT lower these without
      reviewing the privacy impact.
    -->
    <script>
      (function () {
        var key = '%VITE_POSTHOG_KEY%';
        var host = '%VITE_POSTHOG_HOST%' || 'https://eu.i.posthog.com';
        // Vite leaves the literal %VITE_…% token in place when the var is unset.
        // Treat that and an empty string the same — disable PostHog by skipping init.
        if (!key || key.indexOf('%') === 0) {
          window.posthog = {
            __disabled: true,
            capture: function () {},
            identify: function () {},
            reset: function () {},
            opt_in_capturing: function () {},
            opt_out_capturing: function () {},
            has_opted_in_capturing: function () { return false; },
            has_opted_out_capturing: function () { return false; }
          };
          return;
        }

          api_host: host,
          defaults: '2026-01-30',
          person_profiles: 'identified_only',
          opt_out_capturing_by_default: true,
          disable_session_recording: false,
          loaded: function (ph) {
            try {
              console.log('[posthog] loaded', {
                distinct_id: ph.get_distinct_id(),
                opted_in: ph.has_opted_in_capturing(),
                opted_out: ph.has_opted_out_capturing()

          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

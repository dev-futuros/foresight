# Production profile.
# Activated with: SPRING_PROFILES_ACTIVE=prod
#
# Hardened defaults. NEVER override foresight.security.auth-disabled=true here.

# Auth enforced. Belt and braces — even if someone tampered with application.properties,
# this re-asserts the safe value.
foresight.security.auth-disabled=false

# Quieter logs to keep prod log volume manageable. Errors and warnings still surface.
logging.level.root=WARN
logging.level.com.foresight=INFO
logging.level.org.springframework=WARN

# Swagger / OpenAPI off in production — no need to advertise the API surface publicly.
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Don't leak internal exception messages to clients.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Tighter Hikari sizing — adjust based on your DB plan and observed load.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

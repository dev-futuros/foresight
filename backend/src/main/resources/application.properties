spring.application.name=foresight-backend

# Loads ../.env.local automatically when running `./mvnw spring-boot:run` outside Docker.
# `optional:` means the app still starts if the file is missing (e.g. in production where
# the container injects real env vars). Real env vars always win over the file.
# To use a different file, override on the CLI:
#   ./mvnw spring-boot:run "-Dspring.config.import=optional:dotenv:?directory=../&filename=.env.dev"
spring.config.import=optional:dotenv:?directory=../&filename=.env.local

# Database (dev-friendly defaults, override via env in real environments)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foresight_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:foresight_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:foresight_dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (Flyway is the source of truth for schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080
server.error.include-message=always

# Auth toggle. ALWAYS false in production. Override only via the 'local' profile
# (application-local.properties) when you want to hit endpoints from Swagger without a token.
foresight.security.auth-disabled=false

# Clerk — issuer URL ("Frontend API URL" in the Clerk Dashboard, no trailing slash) and the
# JWKS URI used to validate session JWT signatures. Both default to placeholders so the app
# still starts in environments that haven't been configured yet (auth requests will then fail
# with a clear validation error). In real environments, set CLERK_ISSUER and CLERK_JWKS_URI.
foresight.security.clerk.issuer=${CLERK_ISSUER:https://sharp-sunbird-71.clerk.accounts.dev}
foresight.security.clerk.jwks-uri=${CLERK_JWKS_URI:https://sharp-sunbird-71.clerk.accounts.dev/.well-known/jwks.json}
# Webhook signing secret from Clerk Dashboard → Webhooks → Endpoint → Signing Secret.
foresight.security.clerk.webhook-signing-secret=${CLERK_WEBHOOK_SIGNING_SECRET:whsec_replace_me}
# Backend API secret key (Clerk Dashboard → API Keys → Secret Keys, sk_test_... / sk_live_...).
# Used to fetch the user's profile (first_name / last_name) when lazy-creating a local row,
# so we don't depend on a Clerk JWT template being configured. Optional: if blank, lazy-create
# falls back to whatever the JWT carries (typically nothing) and `name` stays null until the
# webhook fires or the user edits their profile.
foresight.security.clerk.secret-key=${CLERK_SECRET_KEY:}
foresight.security.clerk.api-base-url=${CLERK_API_BASE_URL:https://api.clerk.com/v1}

# CORS (dev defaults)
foresight.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Anthropic (optional in dev)
foresight.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
foresight.ai.anthropic.base-url=https://api.anthropic.com
foresight.ai.anthropic.model=claude-haiku-4-5-20251001
foresight.ai.anthropic.version=2023-06-01

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator — expose ONLY the health endpoint publicly. Everything else is opt-in.
# /actuator/health is the canonical probe for orchestrators (Docker, k8s, load balancers).
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Frontend URL kept around for non-auth flows that may want to build absolute links.
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Rate limiting for AI endpoints. Keyed by authenticated user id (not IP), because every
# AI call burns Anthropic tokens and we want a hard ceiling per real user. 100 calls/hour
# is generous for genuine wizard use and inhospitable to scripted spam.
foresight.security.rate-limit.ai.capacity=100
foresight.security.rate-limit.ai.refill-tokens=100
foresight.security.rate-limit.ai.refill-period=PT1H

# Anthropic HTTP client timeouts + retries.
foresight.ai.anthropic.connect-timeout=PT10S
foresight.ai.anthropic.read-timeout=PT480S
foresight.ai.anthropic.max-retries=3
foresight.ai.anthropic.retry-backoff=PT5S

# Spring MVC async timeout. The /api/ai/analyze/* endpoints return Mono<JsonNode>
# wrapped by Spring's async dispatcher, which defaults to ~30s — far shorter than
# the upstream Anthropic call (read-timeout 480s above). With web_search enabled
# on every analyze section, a single call can run 60-120s; the analyze endpoints
# were dying with AsyncRequestTimeoutException long before the model finished.
# Align this with the Anthropic read-timeout (480s) so the dispatcher won't
# pre-empt a slow-but-legitimate response.
spring.mvc.async.request-timeout=480000

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.foresight=DEBUG

spring.application.name=foresight-backend

# Loads ../.env.local automatically when running `./mvnw spring-boot:run` outside Docker.
# `optional:` means the app still starts if the file is missing (e.g. in production where
# the container injects real env vars). Real env vars always win over the file.
# To use a different file, override on the CLI:
#   ./mvnw spring-boot:run "-Dspring.config.import=optional:dotenv:?directory=../&filename=.env.dev"
spring.config.import=optional:dotenv:?directory=../&filename=.env.local

# Database (dev-friendly defaults, override via env in real environments)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foresight_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:foresight_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:foresight_dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (Flyway is the source of truth for schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080
server.error.include-message=always

# Auth toggle. ALWAYS false in production. Override only via the 'local' profile
# (application-local.properties) when you want to hit endpoints from Swagger without a token.
foresight.security.auth-disabled=false

# JWT (safe dev default, MUST override in real environments)
foresight.security.jwt.secret=${JWT_SECRET:dev_jwt_secret_change_in_prod_min_32_chars}
foresight.security.jwt.access-token-ttl=PT24H

# CORS (dev defaults)
foresight.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Anthropic (optional in dev)
foresight.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
foresight.ai.anthropic.base-url=https://api.anthropic.com
foresight.ai.anthropic.model=claude-haiku-4-5-20251001
foresight.ai.anthropic.version=2023-06-01

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator — expose ONLY the health endpoint publicly. Everything else is opt-in.
# /actuator/health is the canonical probe for orchestrators (Docker, k8s, load balancers).
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Password reset + email verification token lifetimes.
foresight.security.password-reset-token-ttl=PT30M
foresight.security.email-verification-token-ttl=PT24H

# Rate limiting (Bucket4j, in-memory). Applies to /api/auth/login, /register, /forgot-password.
# Keyed by client IP. Bursts above `capacity` fail fast with 429. The bucket refills at
# `refill-tokens` per `refill-period`. Defaults are generous enough for a real user but
# cheap for brute-force attempts (which burst much higher).
foresight.security.rate-limit.auth.capacity=10
foresight.security.rate-limit.auth.refill-tokens=10
foresight.security.rate-limit.auth.refill-period=PT1M

# Rate limiting for AI endpoints. Keyed by authenticated user id (not IP), because every
# AI call burns Anthropic tokens and we want a hard ceiling per real user. 30 calls/hour
# is generous for genuine wizard use (a session typically does ~10-20 regenerates plus
# one analyze) and inhospitable to scripted spam.
foresight.security.rate-limit.ai.capacity=30
foresight.security.rate-limit.ai.refill-tokens=30
foresight.security.rate-limit.ai.refill-period=PT1H

# Anthropic HTTP client timeouts + retries.
foresight.ai.anthropic.connect-timeout=PT10S
foresight.ai.anthropic.read-timeout=PT480S
foresight.ai.anthropic.max-retries=3
foresight.ai.anthropic.retry-backoff=PT5S

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.foresight=DEBUG
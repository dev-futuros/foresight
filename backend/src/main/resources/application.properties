spring.application.name=foresight-backend

# Loads ../.env.local automatically when running `./mvnw spring-boot:run` outside Docker.
# `optional:` means the app still starts if the file is missing (e.g. in production where
# the container injects real env vars). Real env vars always win over the file.
# To use a different file, override on the CLI:
#   ./mvnw spring-boot:run "-Dspring.config.import=optional:dotenv:?directory=../&filename=.env.dev"
spring.config.import=optional:dotenv:?directory=../&filename=.env.local

# Database (dev-friendly defaults, override via env in real environments)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foresight_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:foresight_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:foresight_dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (Flyway is the source of truth for schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server. Port resolves from SERVER_PORT (explicit), then PORT (Railway / Heroku
# / Fly inject this directly on the container — their template refs like
# `${{PORT}}` don't resolve for the auto-injected PORT, so we must accept it as
# a plain env var here), then 8080 (local default).
server.port=${SERVER_PORT:${PORT:8080}}
server.error.include-message=always

# Auth toggle. ALWAYS false in production. Override only via the 'local' profile
# (application-local.properties) when you want to hit endpoints from Swagger without a token.
foresight.security.auth-disabled=false

# --- Kinde (auth + Management API) ---
# Tenant URL with scheme, no trailing slash. Used both directly and as the base from which
# JWKS / token endpoint / Management API URLs derive. The Management API audience required by
# the M2M token request is always `<domain>/api`, derived in KindeBackendClient.
foresight.security.kinde.domain=${KINDE_DOMAIN:https://futuros.kinde.com}
# JWT `iss` claim — same value as `domain` for stock Kinde tenants. Pinned by the issuer
# validator so a token minted by a different tenant cannot be accepted.
foresight.security.kinde.issuer=${KINDE_ISSUER:https://futuros.kinde.com}
# JWKS endpoint used by NimbusJwtDecoder to validate BOTH session JWTs and webhook payloads
# (Kinde signs webhooks with JWT — no separate webhook signing secret).
foresight.security.kinde.jwks-uri=${KINDE_JWKS_URI:https://futuros.kinde.com/.well-known/jwks}
# OAuth2 token endpoint for the client_credentials grant.
foresight.security.kinde.token-endpoint=${KINDE_TOKEN_ENDPOINT:https://futuros.kinde.com/oauth2/token}
# Base URL of the Management API. The full request URL is `<base>/user?id=...`.
foresight.security.kinde.management-api-base-url=${KINDE_MANAGEMENT_API_BASE_URL:https://futuros.kinde.com/api/v1}
# Credentials of the M2M app created in Kinde Dashboard → Applications. Granted the
# `read:users` scope on the Management API. Blank disables KindeBackendClient (lazy-create
# falls back to JWT claims for `name`).
foresight.security.kinde.m2m-client-id=${KINDE_M2M_CLIENT_ID:}
foresight.security.kinde.m2m-client-secret=${KINDE_M2M_CLIENT_SECRET:}

# CORS (dev defaults)
foresight.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Anthropic (optional in dev)
foresight.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
foresight.ai.anthropic.base-url=https://api.anthropic.com
# Fallback model used when a caller doesn't pick a specific tier. The per-tier
# IDs below are what each operation actually uses (see AiService for the
# mapping); this default just keeps the AnthropicClient bootable if a tier
# field is left blank in some env-specific override.
foresight.ai.anthropic.model=claude-haiku-4-5-20251001
# Per-tier model selection. Tunable per environment without touching code.
#   haiku  — cheap/fast calls: AI suggestions, Step 2 dim reformulations.
#   sonnet — Step 2 global STEEP scan (web search) + chat assistant.
#   opus   — all final-report calls (the up-front research scan + the 5 section
#            calls + the legacy /analyze and /analyze/sources endpoints).
foresight.ai.anthropic.models.haiku=claude-haiku-4-5-20251001
foresight.ai.anthropic.models.sonnet=claude-sonnet-4-6
foresight.ai.anthropic.models.opus=claude-opus-4-7
foresight.ai.anthropic.version=2023-06-01

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator — expose ONLY the health endpoint publicly. Everything else is opt-in.
# /actuator/health is the canonical probe for orchestrators (Docker, k8s, load balancers).
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Frontend URL kept around for non-auth flows that may want to build absolute links.
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Rate limiting for AI endpoints. Keyed by authenticated user id (not IP), because every
# AI call burns Anthropic tokens and we want a hard ceiling per real user. 100 calls/hour
# is generous for genuine wizard use and inhospitable to scripted spam.
foresight.security.rate-limit.ai.capacity=100
foresight.security.rate-limit.ai.refill-tokens=100
foresight.security.rate-limit.ai.refill-period=PT1H

# Anthropic HTTP client timeouts + retries.
foresight.ai.anthropic.connect-timeout=PT10S
foresight.ai.anthropic.read-timeout=PT480S
foresight.ai.anthropic.max-retries=3
foresight.ai.anthropic.retry-backoff=PT5S

# Spring MVC async timeout. The /api/ai/analyze/* endpoints return Mono<JsonNode>
# wrapped by Spring's async dispatcher, which defaults to ~30s — far shorter than
# the upstream Anthropic call (read-timeout 480s above). With web_search enabled
# on every analyze section, a single call can run 60-120s; the analyze endpoints
# were dying with AsyncRequestTimeoutException long before the model finished.
# Align this with the Anthropic read-timeout (480s) so the dispatcher won't
# pre-empt a slow-but-legitimate response.
spring.mvc.async.request-timeout=480000

# PostHog server-side analytics. Fires $ai_generation events for every Anthropic call so
# token usage / latency / citations show up in PostHog's LLM analytics dashboards alongside
# the frontend's pageviews. Disabled by default — flip POSTHOG_ENABLED=true and supply
# POSTHOG_KEY to turn on. POSTHOG_HOST defaults to EU cloud (matches the demo project).
foresight.analytics.posthog.enabled=${POSTHOG_ENABLED:false}
foresight.analytics.posthog.api-key=${POSTHOG_KEY:}
foresight.analytics.posthog.host=${POSTHOG_HOST:https://eu.i.posthog.com}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.foresight=DEBUG

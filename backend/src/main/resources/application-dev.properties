# Dev profile.
# Activated with: SPRING_PROFILES_ACTIVE=dev
#
# Acts as a "rehearsal" for production: real auth, no debug noise, but Swagger stays open
# so QA / integration tests can still introspect the API.

# Auth fully enforced (default in application.properties, repeated here for clarity).
foresight.security.auth-disabled=false

# Less chatty than local but still gives useful traces if something misbehaves.
logging.level.com.foresight=DEBUG
logging.level.org.springframework.web=DEBUG

# Swagger remains enabled in dev so QA / integration tests can hit the API.
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

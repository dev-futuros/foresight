# Local development profile.
# Activated with: -Dspring.profiles.active=local  (or  SPRING_PROFILES_ACTIVE=local)
#
# When this profile is active:
#   - Authentication is disabled — every endpoint is public.
#   - JwtAuthFilter injects a synthetic dev user (see DevPrincipal) so @CurrentUser still works.
#   - DevUserSeeder ensures a matching row exists in the users table.
#
# DO NOT enable this profile in production.

foresight.security.auth-disabled=true

# Verbose logging so you can see why a request was accepted/rejected.
logging.level.com.foresight.backend.common.security=DEBUG

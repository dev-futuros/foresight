# Test-only overrides. Activated by `@ActiveProfiles("test")` on the integration-test base.
#
# The production rate limit is deliberately tight (10 req/min per IP). A single integration
# test class typically fires many requests from 127.0.0.1 in a fraction of a second, which
# would trip the limiter and turn every test suite red. Lift the ceiling here so rate limiting
# is tested explicitly in a dedicated test (which sets its own properties) rather than as a
# constant source of flakes.
foresight.security.rate-limit.auth.capacity=100000
foresight.security.rate-limit.auth.refill-tokens=100000
foresight.security.rate-limit.auth.refill-period=PT1S

# JWT secret long enough to satisfy the HS256 minimum (32 bytes).
foresight.security.jwt.secret=test-jwt-secret-that-is-definitely-long-enough-32b++
foresight.security.jwt.access-token-ttl=PT1H

# Token TTLs match production defaults; tests that need expired tokens mint their own.
foresight.security.password-reset-token-ttl=PT30M
foresight.security.email-verification-token-ttl=PT24H

# Anthropic key is irrelevant in ITs — AI endpoints are not exercised here.
foresight.ai.anthropic.api-key=test-key-not-used

# Test-only overrides. Activated by `@ActiveProfiles("test")` on integration tests.
#
# Auth is disabled in tests so MockMvc requests can hit protected endpoints without
# needing to mint valid Kinde session JWTs. Tests that specifically exercise the auth
# path should override this back to `false` and provide a stub `JwtDecoder`.
foresight.security.auth-disabled=true

# Auth provider values are unused while auth is disabled, but the properties record requires
# them to be bindable. Placeholders keep Spring's startup happy.
foresight.security.kinde.domain=https://test.kinde.com
foresight.security.kinde.issuer=https://test.kinde.com
foresight.security.kinde.jwks-uri=https://test.kinde.com/.well-known/jwks
foresight.security.kinde.token-endpoint=https://test.kinde.com/oauth2/token
foresight.security.kinde.management-api-base-url=https://test.kinde.com/api/v1
foresight.security.kinde.m2m-client-id=
foresight.security.kinde.m2m-client-secret=

# Anthropic key is irrelevant in ITs — AI endpoints are not exercised here.
foresight.ai.anthropic.api-key=test-key-not-used

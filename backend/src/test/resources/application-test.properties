# Test-only overrides. Activated by `@ActiveProfiles("test")` on integration tests.
#
# Auth is disabled in tests so MockMvc requests can hit protected endpoints without
# needing to mint valid Clerk session JWTs. Tests that specifically exercise the auth
# path should override this back to `false` and provide a stub `JwtDecoder`.
foresight.security.auth-disabled=true

# Clerk values are unused while auth is disabled, but the properties record requires
# them to be bindable. Placeholders keep Spring's startup happy.
foresight.security.clerk.issuer=https://test.clerk.accounts.dev
foresight.security.clerk.jwks-uri=https://test.clerk.accounts.dev/.well-known/jwks.json
foresight.security.clerk.webhook-signing-secret=whsec_test_only

# Anthropic key is irrelevant in ITs — AI endpoints are not exercised here.
foresight.ai.anthropic.api-key=test-key-not-used
